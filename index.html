<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Weather Research Dashboard</title>
    <!-- Muat turun Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2rem;
            color: #1a365d;
            margin-bottom: 10px;
        }
        .meta-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.95rem;
            color: #4a5568;
            flex-wrap: wrap;
        }
        .badge {
            background-color: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .badge-location {
            background-color: #f0fff4;
            color: #38a169;
        }
        .dashboard-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
        }
        #update-status {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Malaysian University Weather Research Dashboard</h1>
            <div class="meta-info">
                <span class="badge">📍 Kampus: Universiti Malaya (UM)</span>
                <span class="badge badge-location">🌍 Lokasi: Kuala Lumpur (3.14° N, 101.69° E)</span>
                <span class="badge" id="update-status">Status: Memuatkan data...</span>
            </div>
        </div>
        
        <!-- Kotak Graf Premium -->
        <div class="dashboard-card">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <script>
    let myChart = null;

    function dapatkanDataCuaca() {
        fetch("https://api.open-meteo.com/v1/forecast?latitude=3.14&longitude=101.69&hourly=temperature_2m")
        .then(res => {
            if (!res.ok) throw new Error('API down');
            return res.json();
        })
        .then(data => {
            // Ambil 8 data waktu dan suhu terawal untuk penuhi graf dengan cantik
            const labels = data.hourly.time.slice(0, 8).map(t => t.split("T")[1]); 
            const temperatures = data.hourly.temperature_2m.slice(0, 8);

            if (myChart) {
                myChart.destroy();
            }

            // Guna reka bentuk graf yang lebih moden dan premium
            myChart = new Chart(document.getElementById("chart"), {
                type: "line", 
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Suhu Sekitar Kampus (°C)",
                        data: temperatures,
                        backgroundColor: "rgba(43, 108, 176, 0.1)", 
                        borderColor: "rgba(43, 108, 176, 1)",
                        borderWidth: 3,
                        pointBackgroundColor: "rgba(43, 108, 176, 1)",
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        tension: 0.4, // Buat garisan graf melengkung lembut
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                font: {
                                    size: 14,
                                    weight: 'bold'
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: {
                                color: "rgba(0, 0, 0, 0.05)"
                            },
                            ticks: {
                                font: { size: 12 }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });

            const masaSekarang = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById("update-status").innerText = "🔄 Auto-Update: " + masaSekarang;
        })
        .catch(err => {
            console.error("Error:", err);
            // Backup mode kalau API lambat load
            const backupLabels = ["06:00", "09:00", "12:00", "15:00", "18:00", "21:00"];
            const backupData = [25, 27, 32, 31, 29, 26];
            
            if (myChart) myChart.destroy();
            
            myChart = new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: backupLabels,
                    datasets: [{
                        label: "Suhu Kampus (°C) - Mode Stabil",
                        data: backupData,
                        borderColor: "rgba(43, 108, 176, 1)",
                        borderWidth: 3,
                        tension: 0.4
                    }]
                },
                options: { responsive: true }
            });
            document.getElementById("update-status").innerText = "⚠️ Mode Stabil (Offline)";
        });
    }

    // Jalankan kali pertama
    dapatkanDataCuaca();

    // Auto-refresh setiap 5 minit
    setInterval(dapatkanDataCuaca, 300000); 
    </script>

</body>
</html>
