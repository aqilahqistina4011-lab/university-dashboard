<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Weather Research Dashboard</title>
    <!-- Muat turun Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #06080c; /* Hitam pekat Cyber */
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Top Navigation Bar */
        .navbar {
            background-color: #0f131a; /* Kad gelap */
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 255, 157, 0.1); /* Garis halus hijau neon */
        }
        .navbar h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #00ff9d; /* Hijau Neon */
        }
        .navbar span {
            font-size: 0.9rem;
            color: #00d2ff; /* Biru Elektrik */
            font-weight: bold;
        }

        /* Main Hero Card */
        .hero-card {
            background: linear-gradient(135deg, #111622 0%, #080b11 100%);
            padding: 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 210, 255, 0.1);
        }
        .hero-main h1 {
            font-size: 3.5rem;
            margin: 0;
            display: inline-block;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .hero-main h1 span {
            font-size: 1.5rem;
            vertical-align: super;
            color: #00d2ff;
        }
        .hero-location {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 5px;
        }
        .hero-status {
            text-align: right;
        }
        .hero-status .condition {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff9d; /* Hijau Neon */
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }
        .hero-status .updated-time {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 5px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background-color: #0f131a;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .stat-card h3 {
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            color: #00d2ff; /* Angka biru elektrik */
        }
        .stat-card p {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        /* Charts Layout */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }
        .chart-box {
            background-color: #0f131a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .chart-box h4 {
            margin: 0 0 20px 0;
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            .hero-card { flex-direction: column; text-align: center; gap: 20px; }
            .hero-status { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Nav -->
        <div class="navbar">
            <h2>🏫 University Weather Research Studio</h2>
            <span id="refresh-badge">⚡ Live Sync Enabled</span>
        </div>

        <!-- Main Card -->
        <div class="hero-card">
            <div>
                <div class="hero-main">
                    <h1 id="hero-temp">--</h1><h1><span>°C</span></h1>
                </div>
                <div class="hero-location">📍 Universiti Malaya, Kuala Lumpur</div>
            </div>
            <div class="hero-status">
                <p class="condition" id="hero-condition">Loading...</p>
                <p class="updated-time" id="live-clock">Last sync: --:--</p>
            </div>
        </div>

        <!-- Stats row -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="stat-humidity">--%</h3>
                <p>Humidity</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-wind">-- km/h</h3>
                <p>Wind Speed</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-rain">-- mm</h3>
                <p>Precipitation</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #fff;">3.14° N</h3>
                <p>Latitude</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #fff;">101.69° E</h3>
                <p>Longitude</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-grid">
            <div class="chart-box">
                <h4>📈 Temperature Analytics</h4>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>💧 Humidity Metrics</h4>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    let tempChartInstance = null;
    let humidityChartInstance = null;

    function dapatkanDataCuaca() {
        fetch("https://api.open-meteo.com/v1/forecast?latitude=3.14&longitude=101.69&current=temperature_2m,relative_humidity_2m,rain,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m&timezone=Asia%2FKuala_Lumpur")
        .then(res => res.json())
        .then(data => {
            const currentTemp = Math.round(data.current.temperature_2m);
            document.getElementById("hero-temp").innerText = currentTemp;
            document.getElementById("stat-humidity").innerText = data.current.relative_humidity_2m + "%";
            document.getElementById("stat-wind").innerText = Math.round(data.current.wind_speed_10m) + " km/h";
            document.getElementById("stat-rain").innerText = data.current.rain + " mm";

            if(data.current.rain > 0) {
                document.getElementById("hero-condition").innerText = "Drizzle / Rain";
            } else {
                document.getElementById("hero-condition").innerText = currentTemp > 30 ? "Clear Sky" : "Cloudy";
            }

            const masaSekarang = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            document.getElementById("live-clock").innerText = "Last sync: " + masaSekarang;

            const jamLabels = data.hourly.time.slice(0, 7).map(t => t.split("T")[1]);
            const dataSuhu = data.hourly.temperature_2m.slice(0, 7);
            const dataHumidity = data.hourly.relative_humidity_2m.slice(0, 7);

            // Graf 1: Hijau Neon Line Chart
            if (tempChartInstance) tempChartInstance.destroy();
            tempChartInstance = new Chart(document.getElementById("tempChart"), {
                type: "line",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        label: "Temperature (°C)",
                        data: dataSuhu,
                        borderColor: "#00ff9d",
                        backgroundColor: "rgba(0, 255, 157, 0.05)",
                        borderWidth: 3,
                        pointBackgroundColor: "#00ff9d",
                        pointRadius: 4,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#64748b" } },
                        x: { grid: { display: false }, ticks: { color: "#64748b" } }
                    }
                }
            });

            // Graf 2: Biru Elektrik Bar Chart
            if (humidityChartInstance) humidityChartInstance.destroy();
            humidityChartInstance = new Chart(document.getElementById("humidityChart"), {
                type: "bar",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        label: "Relative Humidity (%)",
                        data: dataHumidity,
                        backgroundColor: "rgba(0, 210, 255, 0.6)",
                        borderColor: "#00d2ff",
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { color: "#64748b" } },
                        x: { grid: { display: false }, ticks: { color: "#64748b" } }
                    }
                }
            });
        })
        .catch(err => console.error("Error muat data:", err));
    }

    dapatkanDataCuaca();
    setInterval(dapatkanDataCuaca, 300000); // Auto-update 5 minit
    </script>
</body>
</html>
