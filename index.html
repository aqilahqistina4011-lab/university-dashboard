<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 My Cute Weather Dashboard 🌸</title>
    <!-- Muat turun Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        
        body {
            font-family: 'Quicksand', 'Comic Sans MS', sans-serif;
            background-color: #fff0f5; /* Soft Lavender Blush / Pastel Pink */
            background-image: radial-gradient(#ffe4e1 20%, transparent 20%), radial-gradient(#ffe4e1 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px; /* Corak polka dot comel soft */
            color: #6b4f5b;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        /* Header Kartun */
        .navbar {
            background-color: #ffffff;
            padding: 15px 25px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 0px #f3d1dc; /* Shadow tebal ala kartun */
            border: 3px solid #fbc4d6;
        }
        .navbar h2 {
            margin: 0;
            font-size: 1.6rem;
            color: #ff6b8b;
        }
        
        /* Main Hero Card Cute */
        .hero-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 0px #f3d1dc;
            border: 3px solid #fbc4d6;
            position: relative;
            overflow: hidden;
        }
        .hero-main h1 {
            font-size: 4rem;
            margin: 0;
            color: #ff6b8b;
        }
        .hero-main h1 span {
            font-size: 1.8rem;
            color: #ffb6c1;
        }
        .hero-location {
            font-size: 1.1rem;
            color: #a38895;
            font-weight: bold;
            margin-top: 5px;
        }
        .hero-status {
            text-align: right;
        }
        .hero-status .condition {
            font-size: 2.2rem;
            margin: 0;
        }
        
        /* Quote Box Feature */
        .quote-box {
            background-color: #fff9db;
            border: 3px dashed #fcc419;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 1.1rem;
            color: #927e16;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            border: 3px solid #e8f5e9;
            box-shadow: 0 6px 0px #d4edd6;
        }
        .stat-card.pink-shadow {
            border: 3px solid #fff0f3;
            box-shadow: 0 6px 0px #fcd7de;
        }
        .stat-card h3 {
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            color: #ff6b8b;
        }
        .stat-card p {
            font-size: 0.85rem;
            color: #a38895;
            margin: 0;
            font-weight: bold;
        }

        /* Charts Layout */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }
        .chart-box {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 0px #f3d1dc;
            border: 3px solid #fbc4d6;
        }
        .chart-box h4 {
            margin: 0 0 20px 0;
            color: #ff6b8b;
            font-size: 1.2rem;
        }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            .hero-card { flex-direction: column; text-align: center; gap: 20px; }
            .hero-status { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Nav -->
        <div class="navbar">
            <h2>✨ 🎀 Aqilah's Kawaii Weather Station 🎀 ✨</h2>
        </div>

        <!-- Main Card -->
        <div class="hero-card">
            <div>
                <div class="hero-main">
                    <h1 id="hero-temp">--</h1><h1><span>°C</span></h1>
                </div>
                <div class="hero-location">📍 Universiti Malaya, KL</div>
            </div>
            <div class="hero-status">
                <p class="condition" id="hero-avatar">🧸</p>
                <p id="hero-condition" style="font-weight: bold; margin: 5px 0 0 0; color: #ff6b8b;">Loading...</p>
            </div>
        </div>

        <!-- NEW FEATURE: Cute Daily Capsule -->
        <div class="quote-box" id="cute-quote">
            Loading your cute message... 🧠✨
        </div>

        <!-- Stats row -->
        <div class="stats-grid">
            <div class="stat-card pink-shadow">
                <h3 id="stat-humidity">--%</h3>
                <p>💧 Humidity</p>
            </div>
            <div class="stat-card pink-shadow">
                <h3 id="stat-wind">-- km/h</h3>
                <p>🍃 Wind Speed</p>
            </div>
            <div class="stat-card pink-shadow">
                <h3 id="stat-rain">-- mm</h3>
                <p>🌧️ Rain</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #4db6ac;">3.14° N</h3>
                <p>🗺️ Latitude</p>
            </div>
            <div class="stat-card">
                <h3 style="color: #4db6ac;">101.69° E</h3>
                <p>🗺️ Longitude</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-grid">
            <div class="chart-box">
                <h4>🍓 Strawberry Pink Temperature Analytics</h4>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>🔮 Magic Purple Humidity Metrics</h4>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    let tempChartInstance = null;
    let humidityChartInstance = null;

    function dapatkanDataCuaca() {
        fetch("https://api.open-meteo.com/v1/forecast?latitude=3.14&longitude=101.69&current=temperature_2m,relative_humidity_2m,rain,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m&timezone=Asia%2FKuala_Lumpur")
        .then(res => res.json())
        .then(data => {
            const currentTemp = Math.round(data.current.temperature_2m);
            document.getElementById("hero-temp").innerText = currentTemp;
            document.getElementById("stat-humidity").innerText = data.current.relative_humidity_2m + "%";
            document.getElementById("stat-wind").innerText = Math.round(data.current.wind_speed_10m) + " km/h";
            document.getElementById("stat-rain").innerText = data.current.rain + " mm";

            // Logik Tukar Avatar Kartun & Pesanan Comel ikut Cuaca
            if(data.current.rain > 0) {
                document.getElementById("hero-avatar").innerText = "🌧️🧸";
                document.getElementById("hero-condition").innerText = "Drizzle / Rainy";
                document.getElementById("cute-quote").innerText = "🎀 Oh no, hari ni hujan! Jangan lupa bawa payung comel kau tau! ☔";
            } else if (currentTemp > 30) {
                document.getElementById("hero-avatar").innerText = "☀️🥰";
                document.getElementById("hero-condition").innerText = "Super Sunny!";
                document.getElementById("cute-quote").innerText = "✨ Wah, hari ni cerah gila! Jangan lupa pakai sunscreen & minum air banyak-banyak okey! 🥤";
            } else {
                document.getElementById("hero-avatar").innerText = "☁️🐰";
                document.getElementById("hero-condition").innerText = "Cloudy / Cozy";
                document.getElementById("cute-quote").innerText = "🌸 Cuaca hari ni macam best je, sangat cozy untuk sambung tidur... eh silap, sambung belajar! 📚";
            }

            const jamLabels = data.hourly.time.slice(0, 7).map(t => t.split("T")[1]);
            const dataSuhu = data.hourly.temperature_2m.slice(0, 7);
            const dataHumidity = data.hourly.relative_humidity_2m.slice(0, 7);

            // Graf 1: Soft Strawberry Pink Line Chart
            if (tempChartInstance) tempChartInstance.destroy();
            tempChartInstance = new Chart(document.getElementById("tempChart"), {
                type: "line",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        data: dataSuhu,
                        borderColor: "#ff6b8b",
                        backgroundColor: "rgba(255, 107, 139, 0.15)",
                        borderWidth: 4,
                        pointBackgroundColor: "#ff6b8b",
                        pointRadius: 6,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "#fff0f3" }, ticks: { color: "#6b4f5b", font: { family: 'Quicksand', weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { color: "#6b4f5b", font: { family: 'Quicksand', weight: 'bold' } } }
                    }
                }
            });

            // Graf 2: Lavender Purple Bar Chart
            if (humidityChartInstance) humidityChartInstance.destroy();
            humidityChartInstance = new Chart(document.getElementById("humidityChart"), {
                type: "bar",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        data: dataHumidity,
                        backgroundColor: "rgba(181, 142, 237, 0.7)",
                        borderColor: "#b58eed",
                        borderWidth: 2,
                        borderRadius: 12
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "#fff0f3" }, ticks: { color: "#6b4f5b", font: { family: 'Quicksand', weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { color: "#6b4f5b", font: { family: 'Quicksand', weight: 'bold' } } }
                    }
                }
            });
        })
        .catch(err => console.error("Error muat data comel:", err));
    }

    dapatkanDataCuaca();
    setInterval(dapatkanDataCuaca, 300000);
    </script>
</body>
</html>
