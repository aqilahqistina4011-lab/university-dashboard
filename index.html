<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Eco-Weather Dashboard</title>
    <!-- Muat turun Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 30px 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        /* Header & Dropdown */
        .header-panel {
            background: #161d2a;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header-panel h1 {
            margin: 0;
            font-size: 1.6rem;
            color: #ff4a85;
        }
        select {
            background: #222b3e;
            color: white;
            border: 1px solid #3b4a6b;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        /* Main Info Card */
        .main-weather-card {
            background: #161d2a;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .temp-display h2 {
            font-size: 3.5rem;
            margin: 0;
            color: #ffffff;
        }
        .temp-display p {
            margin: 5px 0 0 0;
            color: #a0aec0;
            font-size: 1.1rem;
        }
        .weather-status {
            text-align: right;
        }
        .weather-status h3 {
            font-size: 1.8rem;
            color: #ff4a85;
            margin: 0;
        }
        .weather-status p {
            color: #718096;
            margin: 5px 0 0 0;
            font-size: 0.9rem;
        }
        /* Small Grid Cards */
        .info-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .small-card {
            flex: 1;
            background: #161d2a;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .small-card h4 {
            margin: 0 0 10px 0;
            color: #718096;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .small-card p {
            margin: 0;
            font-size: 1.5rem;
            font-weight: bold;
            color: #36a2eb;
        }
        /* Charts Section */
        .charts-row {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .chart-container {
            flex: 1;
            min-width: 450px;
            background: #161d2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .chart-container h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Navigation / Selector -->
        <div class="header-panel">
            <h1>🎓 Uni-Weather Pro Dashboard</h1>
            <select id="uni-selector" onchange="tukarUniversiti()">
                <option value="um">Universiti Malaya (UM) - KL</option>
                <option value="utm">Universiti Teknologi Malaysia (UTM) - Johor</option>
                <option value="ukm">Universiti Kebangsaan Malaysia (UKM) - Bangi</option>
                <option value="upm">Universiti Putra Malaysia (UPM) - Serdang</option>
                <option value="usm">Universiti Sains Malaysia (USM) - Penang</option>
                <option value="uitm">Universiti Teknologi MARA (UiTM) - Shah Alam</option>
            </select>
        </div>

        <!-- Main Real-time Card -->
        <div class="main-weather-card">
            <div class="temp-display">
                <h2 id="live-temp">--°C</h2>
                <p id="live-campus">📍 Universiti Malaya (UM)</p>
            </div>
            <div class="weather-status">
                <h3 id="weather-text">Data Live</h3>
                <p id="update-time">Loading...</p>
            </div>
        </div>

        <!-- Extra Details Grid -->
        <div class="info-grid">
            <div class="small-card">
                <h4>Humidity Semasa</h4>
                <p id="live-humidity">--%</p>
            </div>
            <div class="small-card">
                <h4>Kelajuan Angin</h4>
                <p id="live-wind">-- km/h</p>
            </div>
        </div>

        <!-- Two Charts Side-by-Side -->
        <div class="charts-row">
            <div class="chart-container">
                <h3>📈 Temperature Trend (Suhu 24 Jam)</h3>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>💧 Humidity Levels (Kelembapan 24 Jam)</h3>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    // Koordinat GPS Kampus Utama Universiti di Malaysia
    const koordinatUni = {
        um: { nama: "Universiti Malaya (UM)", lat: 3.1147, lon: 101.6602 },
        utm: { nama: "Universiti Teknologi Malaysia (UTM)", lat: 1.5610, lon: 103.6378 },
        ukm: { nama: "Universiti Kebangsaan Malaysia (UKM)", lat: 2.9289, lon: 101.7802 },
        upm: { nama: "Universiti Putra Malaysia (UPM)", lat: 2.9996, lon: 101.7232 },
        usm: { nama: "Universiti Sains Malaysia (USM)", lat: 5.3557, lon: 100.3015 },
        uitm: { nama: "Universiti Teknologi MARA (UiTM)", lat: 3.0696, lon: 101.5037 }
    };

    let chartSuhu = null;
    let chartHumidity = null;

    function muatDataCuaca(kodUni) {
        const uni = koordinatUni[kodUni];
        document.getElementById("live-campus").innerText = "📍 " + uni.nama;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${uni.lat}&longitude=${uni.lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m&timezone=Asia%2FSingapore`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            // Update Teks Atas Kad
            document.getElementById("live-temp").innerText = Math.round(data.current.temperature_2m) + "°C";
            document.getElementById("live-humidity").innerText = data.current.relative_humidity_2m + "%";
            document.getElementById("live-wind").innerText = data.current.wind_speed_10m + " km/h";
            document.getElementById("weather-text").innerText = data.current.temperature_2m > 30 ? "Cuaca Panas" : "Redup/Selesa";
            
            const waktuSekarang = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById("update-time").innerText = "Kemas kini pada " + waktuSekarang;

            // Proses Data Graf (Ambil 8 jam pertama untuk paparan cun)
            const labels = data.hourly.time.slice(0, 8).map(t => t.split("T")[1]);
            const tempData = data.hourly.temperature_2m.slice(0, 8);
            const humData = data.hourly.relative_humidity_2m.slice(0, 8);

            // Ganti Graf Suhu (Pink Neon)
            if (chartSuhu) chartSuhu.destroy();
            chartSuhu = new Chart(document.getElementById("tempChart"), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Suhu (°C)',
                        data: tempData,
                        borderColor: '#ff4a85',
                        backgroundColor: 'rgba(255, 74, 133, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true, scales: { x: { grid: { display: false } }, y: { grid: { color: '#222b3e' } } } }
            });

            // Ganti Graf Kelembapan (Bar Biru/Pink Combo)
            if (chartHumidity) chartHumidity.destroy();
            chartHumidity = new Chart(document.getElementById("humidityChart"), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Relative Humidity (%)',
                        data: humData,
                        backgroundColor: '#36a2eb',
                        borderRadius: 6
                    }]
                },
                options: { responsive: true, scales: { x: { grid: { display: false } }, y: { grid: { color: '#222b3e' } } } }
            });
        })
        .catch(err => console.error("Ralat API:", err));
    }

    function tukarUniversiti() {
        const pilihan = document.getElementById("uni-selector").value;
        muatDataCuaca(pilihan);
    }

    // Jalankan automatik untuk UM masa mula buka website
    muatDataCuaca("um");
    </script>
</body>
</html>
