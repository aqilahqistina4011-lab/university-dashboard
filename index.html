<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Weather Research Dashboard</title>
    <!-- Muat turun Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Top Navigation Bar */
        .navbar {
            background-color: #161c2a;
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .navbar h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #ff4a85;
        }
        .navbar span {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        /* Main Hero Card */
        .hero-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hero-main h1 {
            font-size: 3.5rem;
            margin: 0;
            display: inline-block;
        }
        .hero-main h1 span {
            font-size: 1.5rem;
            vertical-align: super;
            color: #9ca3af;
        }
        .hero-location {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-top: 5px;
        }
        .hero-status {
            text-align: right;
        }
        .hero-status .condition {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff4a85;
            margin: 0;
        }
        .hero-status .updated-time {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 5px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background-color: #161c2a;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stat-card h3 {
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            color: #fff;
        }
        .stat-card p {
            font-size: 0.75rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        /* Charts Layout */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }
        .chart-box {
            background-color: #161c2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .chart-box h4 {
            margin: 0 0 20px 0;
            color: #9ca3af;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
            .hero-card { flex-direction: column; text-align: center; gap: 20px; }
            .hero-status { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Nav -->
        <div class="navbar">
            <h2>🏫 University Weather Pro</h2>
            <span id="refresh-badge">🔄 Auto-Update Active</span>
        </div>

        <!-- Main Card -->
        <div class="hero-card">
            <div>
                <div class="hero-main">
                    <h1 id="hero-temp">--</h1><h1><span>°C</span></h1>
                </div>
                <div class="hero-location">📍 Universiti Malaya, Kuala Lumpur</div>
            </div>
            <div class="hero-status">
                <p class="condition" id="hero-condition">Drizzle</p>
                <p class="updated-time" id="live-clock">Last updated: --:--</p>
            </div>
        </div>

        <!-- Stats row -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="stat-humidity">--%</h3>
                <p>Humidity</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-wind">-- km/h</h3>
                <p>Wind Speed</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-rain">-- mm</h3>
                <p>Precipitation</p>
            </div>
            <div class="stat-card">
                <h3>3.14° N</h3>
                <p>Latitude</p>
            </div>
            <div class="stat-card">
                <h3>101.69° E</h3>
                <p>Longitude</p>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="charts-grid">
            <div class="chart-box">
                <h4>📈 Temperature Trend</h4>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-box">
                <h4>💧 Humidity Levels</h4>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
    let tempChartInstance = null;
    let humidityChartInstance = null;

    function dapatkanDataCuaca() {
        // Ambil data cuaca live berserta forecast & current stats
        fetch("https://api.open-meteo.com/v1/forecast?latitude=3.14&longitude=101.69&current=temperature_2m,relative_humidity_2m,rain,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m&timezone=Asia%2FKuala_Lumpur")
        .then(res => res.json())
        .then(data => {
            // 1. Set data kad utama
            const currentTemp = Math.round(data.current.temperature_2m);
            document.getElementById("hero-temp").innerText = currentTemp;
            document.getElementById("stat-humidity").innerText = data.current.relative_humidity_2m + "%";
            document.getElementById("stat-wind").innerText = Math.round(data.current.wind_speed_10m) + " km/h";
            document.getElementById("stat-rain").innerText = data.current.rain + " mm";

            // Set kondisi cuaca ringkas berdasarkan hujan
            if(data.current.rain > 0) {
                document.getElementById("hero-condition").innerText = "Rainy / Drizzle";
            } else {
                document.getElementById("hero-condition").innerText = currentTemp > 30 ? "Sunny / Clear" : "Cloudy";
            }

            // Kemas kini jam kemas kini terakhir
            const masaSekarang = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            document.getElementById("live-clock").innerText = "Last updated: " + masaSekarang;

            // 2. Sediakan label waktu untuk Graf (Ambil 7 jam terawal)
            const jamLabels = data.hourly.time.slice(0, 7).map(t => t.split("T")[1]);
            const dataSuhu = data.hourly.temperature_2m.slice(0, 7);
            const dataHumidity = data.hourly.relative_humidity_2m.slice(0, 7);

            // 3. Render Graf Suhu (Pink/Neon Line Chart)
            if (tempChartInstance) tempChartInstance.destroy();
            tempChartInstance = new Chart(document.getElementById("tempChart"), {
                type: "line",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        label: "Temperature (°C)",
                        data: dataSuhu,
                        borderColor: "#ff4a85",
                        backgroundColor: "rgba(255, 74, 133, 0.1)",
                        borderWidth: 3,
                        pointBackgroundColor: "#ff4a85",
                        pointRadius: 4,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#9ca3af" } },
                        x: { grid: { display: false }, ticks: { color: "#9ca3af" } }
                    }
                }
            });

            // 4. Render Graf Kelembapan (Ungu/Pink Bar Chart)
            if (humidityChartInstance) humidityChartInstance.destroy();
            humidityChartInstance = new Chart(document.getElementById("humidityChart"), {
                type: "bar",
                data: {
                    labels: jamLabels,
                    datasets: [{
                        label: "Relative Humidity (%)",
                        data: dataHumidity,
                        backgroundColor: "rgba(147, 51, 234, 0.6)",
                        borderColor: "#9333ea",
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: "rgba(255,255,255,0.05)" }, ticks: { color: "#9ca3af" } },
                        x: { grid: { display: false }, ticks: { color: "#9ca3af" } }
                    }
                }
            });
        })
        .catch(err => console.error("Error muat data premium:", err));
    }

    // Jalankan terus permulaan
    dapatkanDataCuaca();
    // Auto-refresh setiap 5 minit
    setInterval(dapatkanDataCuaca, 300000);
    </script>
</body>
</html>
